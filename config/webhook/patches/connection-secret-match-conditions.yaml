# Adds CEL matchConditions to the connection secret deletion webhook.
# controller-gen does not support matchConditions in kubebuilder markers,
# so this patch injects it post-generation.
# The CEL expression pre-filters at the API server level so only connection
# secrets (those with opendatahub.io/connection-type-* annotations) are
# forwarded to the webhook handler.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- name: connection-secret-deletion-validator.opendatahub.io
  matchConditions:
  - name: is-connection-secret
    expression: "has(oldObject.metadata.annotations) && ('opendatahub.io/connection-type-protocol' in oldObject.metadata.annotations || 'opendatahub.io/connection-type-ref' in oldObject.metadata.annotations)"
